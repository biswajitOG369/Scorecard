<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet2" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Scorecard</title>
</head>

<body>
    <header>
        <div class="t20">
            <div class="line1"> SUPER-8 </div>
            <img src="logot20.png" alt="logot20">
            <div class="line1"> T20 52 of 55 </div>
        </div>
    </header>
    <div class="main">
        <div class="india">
            <img class="ind" src="27130.jpg" alt="India">
            <h1 class="ind"> INDIA </h1>
        </div>
        <div class="westindies">
            <img src="wi.png" alt="westindies">
            <h1> WESTINDIES </h1>
        </div>
    </div>
    <div class="scr">
        <div class="indsc">

            <img src="cricket-bat.png" alt="bat logo">
            <h1> 199-5 </h1>

        </div>
        <div class="wisc">

            <h1> 195-4 </h1>
            <img src="cricket-bat.png" alt="bat logo">


        </div>
    </div>
    <div class="table">
        <div class="indtbl">
            <table>
                <tr>
                    <td> Samson </td>
                    <th>97*</th>
                    <td>50</td>
                </tr>

                <tr>
                    <td> Tilak </td>

                <tr>
                    <td> Surya kumar </td>

                </tr>

                <tr>
                    <td> Hardik </td>
                    <th>17</th>
                    <td>14</td>
                </tr>
            </table>
        </div>
        <div class="witbl">
            <table>
                <tr>
                    <td> Josh </td>
                    <th>40</th>
                    <td>25</td>
                </tr>

                <tr>
                    <td> Holder </td>
                    <th>37*</th>
                    <td>22</td>
                </tr>

                <tr>
                    <td> Pabel </td>
                    <th>34*</th>
                    <td>19</td>
                </tr>

                <tr>
                    <td> Hope </td>
                    <th>32</th>
                    <td>33 </td>
                </tr>
            </table>
        </div>
    </div>

    <div class="scr">
        <div class="indsc">

            <img src="cricket-ball.png" alt="bat logo">
            <h1> 19.2 over </h1>

        </div>
        <div class="wisc">

            <h1> 20 over </h1>
            <img src="cricket-ball.png" alt="bat logo">


        </div>
    </div>

     <div class="table">
        <div class="indtbl">
            <table>
                <tr>
                    <td> Holder </td>
                    <th>2-38</th>
                    <td>4</td>
                </tr>

                <tr>
                    <td>S.joshef  </td>
                    <th>2-42</th>
                    <td>4</td>
                </tr>

                <tr>
                    <td> Husen </td>
                    <th>1-22</th>
                    <td>2</td>
                </tr>

                
            </table>
        </div>
        <div class="witbl">
            <table>
                <tr>
                    <td> Bumrah </td>
                    <th>2-36</th>

                </tr>

                <tr>
                    <td> Hardik </td>

                <tr>
                    <td> Barun </td>
                    <th>1-40</th>

                </tr>

               
            </table>
        </div>
    </div>
    <div class="foot">
        <h1> INDIA WON BY 5 WICKET</h1>
    </div>
</body>

</html>
